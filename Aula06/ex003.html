<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa!</title>
    <style>
        body{
            background-color: rgb(15, 214, 58);
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Já me livrei da maldição</p>

    <script>
       var n1 = Number(window.prompt('Digite o primeiro número:'))
       var n2 = Number(window.prompt('Digite o segundo número:'))
       var n3 = Number(window.prompt('Digite o terceiro Número:'))
       var s = n1 + n2
       var div = s/n3
       window.alert('A soma dos valores é ' + s  )
       window.alert('A divisão é ' + div)
       window.alert(`A resultado da soma é ${s} e a divisão é ${div}`)
    </script>
</body>
</html>
