<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
</head>
<body>
    <script>
        var nome = window.prompt('Qual seu nome?')
        document.write(`Seu nome tem ${nome.length} Letras. <br>` ) 
        var n1 = Number(window.prompt('Digite o n1:'))
        document.write(`Seu nome tem ${nome.toUpperCase()} Maiusculas e seu número é ${n1}`)
    </script>
</body>
</html>
